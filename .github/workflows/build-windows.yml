name: Build and Release Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd simple_live_app
          flutter pub get

      - name: Enable Windows Build
        run: |
          flutter config --enable-windows-desktop

      - name: Inject Fix for MSVC Deprecation Error
        run: |
          cd simple_live_app/windows
          python3 -c "
          import os

          runner_cmake = 'Runner/CMakeLists.txt'
          if os.path.exists(runner_cmake):
              with open(runner_cmake, 'r') as f:
                  content = f.read()
              fix_flag = 'set(CMAKE_CXX_FLAGS \"${CMAKE_CXX_FLAGS} /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS\")\n'
              if '_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS' not in content:
                  content = fix_flag + content
              with open(runner_cmake, 'w') as f:
                  f.write(content)

          top_cmake = 'CMakeLists.txt'
          if os.path.exists(top_cmake):
              with open(top_cmake, 'r') as f:
                  content = f.read()
              fix_definition = 'add_compile_definitions(_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS)\n'
              if '_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS' not in content:
                  lines = content.splitlines()
                  inserted = False
                  for i, line in enumerate(lines):
                      if 'project(' in line.lower():
                          lines.insert(i + 1, fix_definition)
                          inserted = True
                          break
                  if not inserted:
                      lines.insert(0, fix_definition)
                  content = '\n'.join(lines)
              with open(top_cmake, 'w') as f:
                  f.write(content)
          print('MSVC Deprecation Fix Injected Successfully!')
          "

      - name: Build Windows App
        run: |
          cd simple_live_app
          flutter build windows --release

      - name: Package to ZIP
        shell: pwsh
        run: |
          cd simple_live_app/build/windows/x64/runner/Release
          Compress-Archive -Path * -DestinationPath ../../../../../simple_live_windows.zip

      - name: Create Release and Upload ZIP
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG_NAME="win-v$(date -u +'%Y%m%d_%H%M')"
          gh release create "$TAG_NAME" \
            --title "自动编译Windows版 $TAG_NAME" \
            --notes "由 GitHub Actions 自动编译生成的 Windows 绿色版桌面程序，解压后运行即可。" \
            simple_live_windows.zip
